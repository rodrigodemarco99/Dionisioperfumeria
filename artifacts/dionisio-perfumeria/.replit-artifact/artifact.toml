kind = "web"
previewPath = "/"
title = "Dionisio Perfumería"
version = "1.0.0"
id = "artifacts/dionisio-perfumeria"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26010

[services.development]
run = "pnpm --filter @workspace/dionisio-perfumeria run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dionisio-perfumeria", "run", "build" ]
publicDir = "artifacts/dionisio-perfumeria/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26010"
BASE_PATH = "/"
